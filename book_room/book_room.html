<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="../global_css/global.css">
     <link rel="stylesheet" href="book_room.css">
</head>
<body>

    <nav id="site-nav">
            <span class="nav-mark">Block&#8209;Tel</span>
            <ul class="nav-links">
                <li><a href="../about_us_page/about_us.html">About Us</a></li>
                <li><a href="../Room_page/room_page.html">Rooms</a></li>
                <li><a href="../book_room/book_room.html">Book a Room</a></li>
                <li><a href="contact_form.html" aria-current="page">Contact</a></li>
                <li><a href="../Home_page/index.html">Home</a></li>
            </ul>
    </nav>

    <main>
        <header>
            <section id="book-room-header">
                <p class="eyebrow">Reserve Your Stay</p>
                <h1>Book a Room</h1>
                <p class="tagline">Choose your dates and we'll take care of the rest.</p>
            </section>
        </header>
 
        <section class="booking-panel">
            <form action="book_room.html" method="POST">
                <div class="field-row">
                    <div class="form-group">
                        <label for="checkin">Check-In</label>
                        <input type="date" id="checkin" name="checkin" required>
                    </div>
                    <div class="form-group">
                        <label for="checkout">Check-Out</label>
                        <input type="date" id="checkout" name="checkout" required>
                    </div>
                </div>
 
                <div class="field-row">
                    <div class="form-group">
                        <label for="guests">Guests</label>
                        <select id="guests" name="guests" required>
                            <option value="1">1 Guest</option>
                            <option value="2" selected>2 Guests</option>
                            <option value="3">3 Guests</option>
                            <option value="4">4 Guests</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="room-type">Room Type</label>
                        <select id="room-type" name="room-type" required>
                            <option value="standard">Standard Room</option>
                            <option value="deluxe">Deluxe Room</option>
                            <option value="suite">Suite</option>
                        </select>
                    </div>
                </div>
 
                <div class="field-row">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" autocomplete="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" autocomplete="email" required>
                    </div>
                </div>
 
                <div class="form-group form-group--full">
                    <label for="requests">Special Requests</label>
                    <textarea id="requests" name="requests" rows="4" placeholder="Optional"></textarea>
                </div>
 
                <button type="submit">Request Booking</button>
            </form>
        </section>
    </main>

    <footer id="site-footer">
        <p>&copy; Block-Tel Hotel</p>
    </footer>

</body>
</html>
